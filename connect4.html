<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect 4 Online</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: sans-serif;
      padding: 20px;
      min-height: 100vh;
    }

    h1 { margin-bottom: 16px; font-size: 1.8rem; }

    /* ── Lobby ── */
    #lobby {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 320px;
    }

    #lobby h2 { font-size: 1.1rem; color: #aaa; margin-bottom: 4px; }

    .lobby-btn {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    #btn-create { background: #ff4136; color: white; }
    #btn-create:hover { background: #cc3329; }

    .divider-text {
      color: #555;
      font-size: 0.85rem;
      letter-spacing: 2px;
    }

    .join-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    .join-row input {
      flex: 1;
      padding: 10px;
      background: #222;
      border: 1px solid #444;
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-align: center;
    }

    .join-row input::placeholder { color: #555; letter-spacing: 1px; text-transform: none; }

    #btn-join {
      padding: 10px 16px;
      background: #0074d9;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    #btn-join:hover { background: #005faf; }

    #lobby-status {
      font-size: 0.85rem;
      color: #ff4136;
      min-height: 20px;
      text-align: center;
    }

    /* ── Waiting ── */
    #waiting {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }

    .room-code-box {
      background: #222;
      border: 2px dashed #444;
      border-radius: 12px;
      padding: 20px 36px;
    }

    .room-code-label { font-size: 0.75rem; color: #666; letter-spacing: 2px; margin-bottom: 6px; }

    .room-code {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 8px;
      color: #0074d9;
    }

    .waiting-text { color: #888; font-size: 0.9rem; animation: blink 1.2s infinite; }

    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── Game ── */
    #game { display: none; flex-direction: column; align-items: center; gap: 12px; }

    #player-info {
      display: flex;
      gap: 24px;
      font-size: 0.9rem;
    }

    .player-tag {
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: bold;
      opacity: 0.4;
      transition: 0.3s;
    }

    .player-tag.active { opacity: 1; transform: scale(1.05); }
    .player-tag.red-tag  { background: rgba(255,65,54,0.2);  border: 2px solid #ff4136; color: #ff4136; }
    .player-tag.blue-tag { background: rgba(0,116,217,0.2); border: 2px solid #0074d9; color: #0074d9; }

    #status {
      font-size: 1rem;
      font-weight: bold;
      min-height: 28px;
      text-align: center;
      color: #ccc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(7, 48px);
      grid-template-rows: repeat(6, 48px);
      gap: 7px;
      background: #0055ff;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,255,0.3);
    }

    @media (min-width: 500px) {
      #board {
        grid-template-columns: repeat(7, 64px);
        grid-template-rows: repeat(6, 64px);
      }
    }

    .cell {
      width: 100%; height: 100%;
      background: #111;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
      position: relative;
    }

    .cell:hover:not(.red):not(.blue):not(.no-hover) { background: #2a2a2a; }
    .cell.red:hover  { background: #ff4136 !important; }
    .cell.blue:hover { background: #0074d9 !important; }
    @media (hover: none) {
      .cell:hover { background: #111 !important; }
      .cell.red:hover  { background: #ff4136 !important; }
      .cell.blue:hover { background: #0074d9 !important; }
    }
    .cell.no-hover { cursor: default; }
    .cell.no-hover:hover { background: #111; }

    .cell.red  { background: #ff4136; box-shadow: inset 0 0 12px rgba(0,0,0,0.5), 0 0 8px rgba(255,65,54,0.4); }
    .cell.blue { background: #0074d9; box-shadow: inset 0 0 12px rgba(0,0,0,0.5), 0 0 8px rgba(0,116,217,0.4); }
    .cell.win  { animation: winPulse 0.6s ease infinite alternate; }

    @keyframes winPulse {
      from { filter: brightness(1); }
      to   { filter: brightness(1.6); }
    }

    @keyframes dropIn {
      0%   { transform: translateY(-300px); opacity: 0; }
      70%  { transform: translateY(6px); }
      100% { transform: translateY(0); opacity: 1; }
    }

    .cell.drop { animation: dropIn 0.3s ease forwards; }

    #game-btns { display: flex; gap: 10px; }

    .game-btn {
      padding: 8px 20px;
      cursor: pointer;
      background: #333;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.2s;
    }

    .game-btn:hover { background: #555; }
  </style>
</head>
<body>

<h1>🔴 Connect 4 Online 🔵</h1>

<!-- Lobby -->
<div id="lobby">
  <h2>Pilih mode</h2>
  <button class="lobby-btn" id="btn-create">🎮 Buat Room Baru</button>
  <div class="divider-text">— atau —</div>
  <div class="join-row">
    <input type="text" id="input-code" placeholder="Kode room" maxlength="4">
    <button id="btn-join">Masuk</button>
  </div>
  <div id="lobby-status"></div>
</div>

<!-- Waiting for opponent -->
<div id="waiting">
  <div class="room-code-box">
    <div class="room-code-label">KODE ROOM</div>
    <div class="room-code" id="display-code">----</div>
  </div>
  <div class="waiting-text">Menunggu lawan masuk...</div>
  <button class="game-btn" id="btn-cancel">Batalkan</button>
</div>

<!-- Game -->
<div id="game">
  <div id="player-info">
    <div class="player-tag red-tag"  id="tag-red">🔴 Kamu</div>
    <div class="player-tag blue-tag" id="tag-blue">🔵 Lawan</div>
  </div>
  <div id="status">Memuat...</div>
  <div id="board"></div>
  <div id="game-btns">
    <button class="game-btn" id="btn-rematch" style="display:none">🔄 Main Lagi</button>
    <button class="game-btn" id="btn-leave">🚪 Keluar</button>
  </div>
  <div id="debug-log" style="font-size:0.7rem;color:#666;margin-top:8px;min-height:16px;letter-spacing:1px;"></div>
  <div id="debug-color" style="font-size:0.7rem;color:#555;letter-spacing:1px;"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, remove, off }
  from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyCs0ILbR4-4Ehpj5Fc0qe51T3lXT88RS1Q",
  authDomain:        "connect4-45933.firebaseapp.com",
  databaseURL:       "https://connect4-45933-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "connect4-45933",
  storageBucket:     "connect4-45933.firebasestorage.app",
  messagingSenderId: "451198042538",
  appId:             "1:451198042538:web:8d27e59009f1ee9b8aabd3",
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── Constants ──
const ROWS = 6, COLS = 7;

// ── State ──
let myColor    = null;   // 'red' | 'blue'
let roomCode   = null;
let roomRef    = null;
let gameOver   = false;
let unsubscribe = null;

// ── UI refs ──
const lobbyEl   = document.getElementById('lobby');
const waitingEl = document.getElementById('waiting');
const gameEl    = document.getElementById('game');
const statusEl  = document.getElementById('status');
const boardEl   = document.getElementById('board');
const lobbyStatus = document.getElementById('lobby-status');

// On-screen debug log untuk HP
const debugEl = document.getElementById('debug-log');
function dlog(msg) {
  console.log(msg);
  if (debugEl) {
    debugEl.textContent = msg;
  }
}

// ── Helpers ──
function randomCode() {
  return Math.random().toString(36).substring(2, 6).toUpperCase();
}

function showScreen(name) {
  lobbyEl.style.display   = name === 'lobby'   ? 'flex' : 'none';
  waitingEl.style.display = name === 'waiting' ? 'flex' : 'none';
  gameEl.style.display    = name === 'game'    ? 'flex' : 'none';
}

function emptyGrid() {
  return Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
}

// ── Build board UI ──
let isProcessing = false;

function buildBoard() {
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell no-hover';
      cell.id = `cell-${r}-${c}`;
      cell.addEventListener('touchend', (e) => {
        e.preventDefault();
        handleClick(c);
      }, { passive: false });
      cell.addEventListener('click', (e) => {
        if (e.sourceCapabilities?.firesTouchEvents) return;
        handleClick(c);
      });
      boardEl.appendChild(cell);
    }
  }
}

function renderGrid(grid, winCells = []) {
  const winSet = new Set(winCells.map(([r,c]) => `${r}-${c}`));
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.getElementById(`cell-${r}-${c}`);
      if (!cell) continue;
      cell.className = 'cell';
      const val = grid[r]?.[c];
      if (val) {
        cell.classList.add(val);
        if (winSet.has(`${r}-${c}`)) cell.classList.add('win');
      }
    }
  }
}

function setClickable(yes) {
  dlog(`setClickable:${yes}`);
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const cell = document.getElementById(`cell-${r}-${c}`);
      if (!cell) continue;
      if (yes) cell.classList.remove('no-hover');
      else cell.classList.add('no-hover');
    }
}

// ── Grid helpers ──
function parseGrid(raw) {
  const grid = emptyGrid();
  if (!raw) return grid;
  for (let r = 0; r < ROWS; r++) {
    const row = raw[r];
    if (!row) continue;
    for (let c = 0; c < COLS; c++) {
      const val = row[c];
      grid[r][c] = (val === 'red' || val === 'blue') ? val : null;
    }
  }
  return grid;
}

// ── Create room ──
async function createRoom() {
  const code = randomCode();
  roomCode  = code;
  myColor   = 'red';
  roomRef   = ref(db, `rooms/${code}`);

  await set(roomRef, {
    grid:     emptyGrid(),
    turn:     'red',
    red:      true,
    blue:     false,
    status:   'waiting',
    winner:   null,
    winCells: null,
  });

  document.getElementById('display-code').textContent = code;
  showScreen('waiting');
  listenRoom();
}

// ── Join room ──
async function joinRoom(code) {
  code = code.toUpperCase().trim();
  if (code.length !== 4) { lobbyStatus.textContent = 'Kode harus 4 karakter.'; return; }

  const snap = await get(ref(db, `rooms/${code}`));
  if (!snap.exists()) { lobbyStatus.textContent = 'Room tidak ditemukan.'; return; }

  const data = snap.val();
  if (data.blue)              { lobbyStatus.textContent = 'Room sudah penuh.'; return; }
  if (data.status !== 'waiting') { lobbyStatus.textContent = 'Game sudah dimulai.'; return; }

  roomCode = code;
  myColor  = 'blue';
  roomRef  = ref(db, `rooms/${code}`);

  // Random siapa yang jalan duluan
  const firstTurn = Math.random() < 0.5 ? 'red' : 'blue';
  await update(roomRef, { blue: true, status: 'playing', turn: firstTurn });
  showScreen('game');
  buildBoard();
  const dc = document.getElementById('debug-color');
  if (dc) dc.textContent = `kamu: ${myColor}`;
  listenRoom();
}

// ── Listen to room changes ──
function listenRoom() {
  if (unsubscribe) { off(roomRef); unsubscribe = null; }
  unsubscribe = onValue(roomRef, snap => {
    if (!snap.exists()) {
      // Room dihapus = lawan keluar
      if (unsubscribe) { off(roomRef); unsubscribe = null; }
      gameOver = true;
      setClickable(false);
      document.getElementById('btn-rematch').style.display = 'none';
      if (gameEl.style.display !== 'none') {
        statusEl.textContent = '😔 Lawan meninggalkan game.';
      } else {
        // Masih di waiting screen
        showScreen('lobby');
      }
      return;
    }

    const data = snap.val();

    // Kalau lawan keluar di tengah game (set winner: 'left')
    if (data.winner === 'left') {
      gameOver = true;
      setClickable(false);
      document.getElementById('btn-rematch').style.display = 'none';
      statusEl.textContent = '😔 Lawan meninggalkan game.';
      return;
    }

    // Waiting: cek kalau lawan sudah join
    if (data.status === 'playing' && waitingEl.style.display !== 'none') {
      showScreen('game');
      buildBoard();
      const dc = document.getElementById('debug-color');
      if (dc) dc.textContent = `kamu: ${myColor}`;
    }

    if (data.status === 'playing' || data.status === 'done') {
      updateGame(data);
    }
  });
}

// ── Update game state from Firebase ──
function updateGame(data) {
  const rawGrid  = data.grid;
  dlog(`grid type:${Array.isArray(rawGrid)?'array':'object'} r0:${JSON.stringify(rawGrid?.[0]).substring(0,30)}`);
  const grid     = parseGrid(rawGrid);
  const winCells = data.winCells ? Object.values(data.winCells) : [];
  renderGrid(grid, winCells);

  const isMyTurn = data.turn === myColor && data.status === 'playing';
  document.getElementById('tag-red').classList.toggle('active',  data.turn === 'red');
  document.getElementById('tag-blue').classList.toggle('active', data.turn === 'blue');

  const redLabel  = myColor === 'red'  ? '🔴 Kamu' : '🔴 Lawan';
  const blueLabel = myColor === 'blue' ? '🔵 Kamu' : '🔵 Lawan';
  document.getElementById('tag-red').textContent  = redLabel;
  document.getElementById('tag-blue').textContent = blueLabel;

  if (data.status === 'done') {
    gameOver = true;
    setClickable(false);
    document.getElementById('btn-rematch').style.display = 'inline-block';
    if (data.winner === 'draw') {
      statusEl.textContent = '🤝 Seri!';
    } else if (data.winner === myColor) {
      statusEl.textContent = '🎉 Kamu Menang!';
    } else {
      statusEl.textContent = '😔 Kamu Kalah.';
    }
  } else {
    gameOver = false;
    document.getElementById('btn-rematch').style.display = 'none';
    if (isMyTurn) {
      statusEl.textContent = 'Giliran kamu!';
      setClickable(true);
    } else {
      statusEl.textContent = 'Menunggu giliran lawan...';
      setClickable(false);
    }
  }
}

// ── Handle column click ──
async function handleClick(col) {
  dlog(`click col:${col} go:${gameOver} proc:${isProcessing}`);
  if (gameOver || isProcessing) return;
  isProcessing = true;

  try {
    const snap = await get(roomRef);
    if (!snap.exists()) { dlog('no room'); return; }
    const data = snap.val();
    dlog(`turn:${data.turn} my:${myColor} status:${data.status}`);
    if (data.turn !== myColor || data.status !== 'playing') { dlog('not my turn'); return; }

    const grid = parseGrid(data.grid);
    let row = -1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (!grid[r][col]) { row = r; break; }
    }
    if (row === -1) { dlog('col full'); return; }

    grid[row][col] = myColor;

    const winCells = checkWin(grid, row, col, myColor);
    if (winCells) {
      await update(roomRef, { grid, turn: myColor, status: 'done', winner: myColor, winCells });
      return;
    }

    const isDraw = grid[0].every(cell => cell !== null);
    if (isDraw) {
      await update(roomRef, { grid, status: 'done', winner: 'draw', winCells: null });
      return;
    }

    const nextTurn = myColor === 'red' ? 'blue' : 'red';
    await update(roomRef, { grid, turn: nextTurn });
    dlog(`moved → next:${nextTurn}`);
  } finally {
    dlog('proc reset');
    isProcessing = false;
  }
}

// ── Win check ──
function checkWin(grid, r, c, color) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    const cells = [[r, c]];
    for (let d of [1, -1]) {
      let nr = r + dr*d, nc = c + dc*d;
      while (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] === color) {
        cells.push([nr, nc]);
        nr += dr*d; nc += dc*d;
      }
    }
    if (cells.length >= 4) return cells;
  }
  return null;
}

// ── Leave room ──
async function leaveRoom() {
  if (unsubscribe) { off(roomRef); unsubscribe = null; }
  if (roomRef) {
    await update(roomRef, { status: 'done', winner: 'left' });
    if (myColor === 'red') await remove(roomRef);
  }
  roomRef = roomCode = myColor = null;
  gameOver = false;
  lobbyStatus.textContent = '';
  document.getElementById('input-code').value = '';
  document.getElementById('btn-rematch').style.display = 'none';
  showScreen('lobby');
}

// ── Rematch ──
async function rematch() {
  if (!roomRef) return;
  const firstTurn = Math.random() < 0.5 ? 'red' : 'blue';
  await update(roomRef, {
    grid:     emptyGrid(),
    turn:     firstTurn,
    status:   'playing',
    winner:   null,
    winCells: null,
  });
  document.getElementById('btn-rematch').style.display = 'none';
}

// ── Event listeners ──
document.getElementById('btn-create').addEventListener('click', createRoom);
document.getElementById('btn-join').addEventListener('click', () => {
  joinRoom(document.getElementById('input-code').value);
});
document.getElementById('input-code').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinRoom(document.getElementById('input-code').value);
});
document.getElementById('btn-cancel').addEventListener('click', async () => {
  if (unsubscribe) { off(roomRef); unsubscribe = null; }
  if (roomRef) await remove(roomRef);
  roomRef = roomCode = myColor = null;
  showScreen('lobby');
});
document.getElementById('btn-leave').addEventListener('click', leaveRoom);
document.getElementById('btn-rematch').addEventListener('click', rematch);

showScreen('lobby');
</script>
</body>
</html>
