<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Connect 4 Realtime - Fixed</title>
    <style>
        body { background: #111; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; padding: 20px; }
        #board { 
            display: grid; grid-template-columns: repeat(7, 50px); grid-template-rows: repeat(6, 50px); 
            gap: 8px; background: #0055ff; padding: 15px; border-radius: 10px;
        }
        @media (min-width: 600px) { #board { grid-template-columns: repeat(7, 80px); grid-template-rows: repeat(6, 80px); } }
        .cell { width: 100%; height: 100%; background: #222; border-radius: 50%; cursor: pointer; border: none; }
        .cell.red { background: #ff4136; box-shadow: inset 0 0 10px black; }
        .cell.blue { background: #0074d9; box-shadow: inset 0 0 10px black; }
        #status { margin: 20px; font-size: 20px; font-weight: bold; background: #222; padding: 10px 20px; border-radius: 8px; }
        button { padding: 10px 25px; cursor: pointer; background: #444; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #666; }
    </style>
</head>
<body>

    <h1>Connect 4 🔴 vs 🔵</h1>
    <div id="status">Menghubungkan ke Firebase...</div>
    <div id="board"></div>
    <br>
    <button id="btnReset">🔄 Reset Papan</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAL_LeOEAay6vF6Y3vAr2qaV9UiAMMDS5E",
        authDomain: "connect4-a1fc8.firebaseapp.com",
        databaseURL: "https://connect4-a1fc8-default-rtdb.firebaseio.com",
        projectId: "connect4-a1fc8",
        storageBucket: "connect4-a1fc8.firebasestorage.app",
        messagingSenderId: "205743853657",
        appId: "1:205743853657:web:46dcf941b55c6ba8192148",
        measurementId: "G-JFPMTX9E93"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, "games/room1");

    const boardEl = document.getElementById("board");
    const statusText = document.getElementById("status");

    let grid = [];
    let currentPlayer = "red";
    let gameOver = false;

    // Fungsi Jatuhkan Pion
    window.dropPiece = function(col) {
        if (gameOver) return;
        
        let rowToFill = -1;
        for (let r = 5; r >= 0; r--) {
            if (grid[r] && grid[r][col] === null) {
                rowToFill = r;
                break;
            }
        }

        if (rowToFill !== -1) {
            grid[rowToFill][col] = currentPlayer;
            const nextPlayer = (currentPlayer === "red") ? "blue" : "red";
            
            // Update ke Firebase
            set(gameRef, { 
                grid: grid, 
                currentPlayer: nextPlayer,
                gameOver: false 
            });
        }
    };

    // Fungsi Reset
    window.restartGame = function() {
        const emptyGrid = Array(6).fill().map(() => Array(7).fill(null));
        set(gameRef, { 
            grid: emptyGrid, 
            currentPlayer: "red",
            gameOver: false 
        });
    };

    // Fungsi Gambar Papan
    function renderUI() {
        boardEl.innerHTML = "";
        for (let r = 0; r < 6; r++) {
            for (let c = 0; c < 7; c++) {
                const cell = document.createElement("div");
                cell.className = "cell";
                
                // Cek isi grid dan tambahkan warna
                if (grid[r] && grid[r][c]) {
                    cell.classList.add(grid[r][c]);
                }

                cell.onclick = () => window.dropPiece(c);
                boardEl.appendChild(cell);
            }
        }
        statusText.textContent = `Giliran: ${currentPlayer === 'red' ? '🔴 Merah' : '🔵 Biru'}`;
    }

    // Mendengarkan Firebase (Realtime)
    onValue(gameRef, (snapshot) => {
        const data = snapshot.val();
        
        // Jika data belum ada atau grid belum dibuat di Firebase
        if (!data || !data.grid) {
            window.restartGame();
            return;
        }

        grid = data.grid;
        currentPlayer = data.currentPlayer;
        gameOver = data.gameOver;

        renderUI();
    });

    // Pasang tombol reset
    document.getElementById("btnReset").onclick = window.restartGame;
</script>
</body>
</html>
