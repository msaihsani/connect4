<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Connect 4 - Realtime</title>
    <style>
        body {
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(7, 70px);
            grid-template-rows: repeat(6, 70px);
            gap: 10px;
            background: #222;
            padding: 15px;
            border-radius: 10px;
            border: 4px solid #444;
            margin-top: 20px;
        }

        .cell {
            width: 70px;
            height: 70px;
            background: #333;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .cell:hover { background: #444; }
        .cell.red { background: #ff4136; box-shadow: inset 0 0 15px #801000; }
        .cell.blue { background: #0074d9; box-shadow: inset 0 0 15px #003060; }

        #status {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
        }

        button {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 1rem;
            cursor: pointer;
            background: #555;
            color: white;
            border: none;
            border-radius: 5px;
        }
        
        button:hover { background: #777; }
    </style>
</head>
<body>

<h1>Connect 4 🔴 vs 🔵</h1>
<div id="status">Memuat Game...</div>
<div id="board"></div>
<button onclick="restartGame()">🔄 Reset Papan</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAL_LeOEAay6vF6Y3vAr2qaV9UiAMMDS5E",
        authDomain: "connect4-a1fc8.firebaseapp.com",
        databaseURL: "https://connect4-a1fc8-default-rtdb.firebaseio.com",
        projectId: "connect4-a1fc8",
        storageBucket: "connect4-a1fc8.firebasestorage.app",
        messagingSenderId: "205743853657",
        appId: "1:205743853657:web:46dcf941b55c6ba8192148",
        measurementId: "G-JFPMTX9E93"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, "games/room1");

    let grid = [];
    let currentPlayer = "red";
    let gameOver = false;

    // Inisialisasi visual board pertama kali
    const boardEl = document.getElementById("board");
    const statusText = document.getElementById("status");

    function createCells() {
        boardEl.innerHTML = "";
        for (let r = 0; r < 6; r++) {
            for (let c = 0; c < 7; c++) {
                const cell = document.createElement("div");
                cell.className = "cell";
                cell.id = `cell-${r}-${c}`;
                cell.onclick = () => handleMove(c);
                boardEl.appendChild(cell);
            }
        }
    }

    createCells();

    // Fungsi klik kolom
    function handleMove(col) {
        if (gameOver) return;

        // Cari baris kosong dari bawah ke atas
        let rowToFill = -1;
        for (let r = 5; r >= 0; r--) {
            if (grid[r] && grid[r][col] === null) {
                rowToFill = r;
                break;
            }
        }

        if (rowToFill !== -1) {
            // Update data lokal
            grid[rowToFill][col] = currentPlayer;
            const nextPlayer = (currentPlayer === "red") ? "blue" : "red";

            // Simpan ke Firebase
            set(gameRef, {
                grid: grid,
                currentPlayer: nextPlayer,
                gameOver: false
            });
        }
    }

    // Dengarkan perubahan dari Firebase
    onValue(gameRef, (snapshot) => {
        const data = snapshot.val();
        
        // Jika data kosong di Firebase, buat baru
        if (!data || !data.grid) {
            window.restartGame();
            return;
        }

        grid = data.grid;
        currentPlayer = data.currentPlayer;
        gameOver = data.gameOver;

        updateUI();
    });

    function updateUI() {
        for (let r = 0; r < 6; r++) {
            for (let c = 0; c < 7; c++) {
                const cell = document.getElementById(`cell-${r}-${c}`);
                const value = grid[r][c];
                
                cell.className = "cell"; // reset class
                if (value) cell.classList.add(value);
            }
        }

        statusText.textContent = `Giliran: ${currentPlayer === 'red' ? '🔴 Merah' : '🔵 Biru'}`;
    }

    // Fungsi reset global
    window.restartGame = function() {
        const emptyGrid = Array(6).fill().map(() => Array(7).fill(null));
        set(gameRef, {
            grid: emptyGrid,
            currentPlayer: "red",
            gameOver: false
        });
    };

</script>
</body>
</html>
