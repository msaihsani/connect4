<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Connect 4 - Red vs Blue</title>
<style>
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: white;
    font-family: Arial, sans-serif;
  }

  h1 {
    margin-top: 20px;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(7, 80px);
    grid-template-rows: repeat(6, 80px);
    gap: 8px;
    background: #222;
    padding: 10px;
    border-radius: 10px;
    margin-top: 20px;
  }

  .cell {
    width: 80px;
    height: 80px;
    background: #333;
    border-radius: 50%;
    cursor: pointer;
    transition: 0.2s;
  }

  .red {
    background: red;
  }

  .blue {
    background: blue;
  }

  #status {
    margin-top: 20px;
    font-size: 18px;
  }
#restartBtn {
  margin-top: 15px;
  padding: 10px 20px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #444;
  color: white;
  transition: 0.2s;
}

#restartBtn:hover {
  background: #666;
}
</style>
</head>
<body>

<h1>Connect 4 🔴 vs 🔵</h1>
<div id="board"></div>
<div id="status">Giliran: 🔴 Merah</div>
<button onclick="restartGame()" id="restartBtn">
  🔄 Restart Game
</button>

<script>
const board = document.getElementById("board");
const statusText = document.getElementById("status");

let currentPlayer = "red";
let gameOver = false;
let grid = Array(6).fill().map(() => Array(7).fill(null));

// Buat grid
for (let row = 0; row < 6; row++) {
  for (let col = 0; col < 7; col++) {
    const cell = document.createElement("div");
    cell.classList.add("cell");
    cell.dataset.row = row;
    cell.dataset.col = col;
    cell.addEventListener("click", () => dropPiece(col));
    board.appendChild(cell);
  }
}

function dropPiece(col) {
  if (gameOver) return;

  for (let row = 5; row >= 0; row--) {
    if (!grid[row][col]) {
      grid[row][col] = currentPlayer;
      updateUI();

      if (checkWin(row, col)) {
        statusText.textContent = 
          (currentPlayer === "red" ? "🔴 Merah" : "🔵 Biru") + " MENANG 🔥";
        gameOver = true;
        return;
      }

      currentPlayer = currentPlayer === "red" ? "blue" : "red";
      statusText.textContent = 
        "Giliran: " + (currentPlayer === "red" ? "🔴 Merah" : "🔵 Biru");
      return;
    }
  }
}

function updateUI() {
  const cells = document.querySelectorAll(".cell");
  cells.forEach(cell => {
    const row = cell.dataset.row;
    const col = cell.dataset.col;
    cell.classList.remove("red", "blue");
    if (grid[row][col]) {
      cell.classList.add(grid[row][col]);
    }
  });
}

function checkWin(row, col) {
  return (
    countDirection(row, col, 0, 1) + countDirection(row, col, 0, -1) > 2 || // horizontal
    countDirection(row, col, 1, 0) > 2 || // vertical
    countDirection(row, col, 1, 1) + countDirection(row, col, -1, -1) > 2 || // diagonal \
    countDirection(row, col, 1, -1) + countDirection(row, col, -1, 1) > 2 // diagonal /
  );
}

function countDirection(row, col, rowDir, colDir) {
  let count = 0;
  let r = row + rowDir;
  let c = col + colDir;

  while (
    r >= 0 && r < 6 &&
    c >= 0 && c < 7 &&
    grid[r][c] === currentPlayer
  ) {
    count++;
    r += rowDir;
    c += colDir;
  }

  return count;
}
function restartGame() {
  grid = Array(6).fill().map(() => Array(7).fill(null));
  currentPlayer = "red";
  gameOver = false;
  statusText.textContent = "Giliran: 🔴 Merah";
  updateUI();
}
</script>
</body>
</html>
