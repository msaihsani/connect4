<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Connect 4 Realtime</title>
    <style>
        body { background: #111; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        #board { 
            display: grid; 
            grid-template-columns: repeat(7, 50px); 
            grid-template-rows: repeat(6, 50px); 
            gap: 8px; 
            background: #0055ff; 
            padding: 15px; 
            border-radius: 10px;
        }
        @media (min-width: 600px) { #board { grid-template-columns: repeat(7, 80px); grid-template-rows: repeat(6, 80px); } }
        .cell { 
            width: 100%; height: 100%; 
            background: #222; border-radius: 50%; 
            cursor: pointer; border: none;
        }
        .cell.red { background: red; box-shadow: inset 0 0 10px black; }
        .cell.blue { background: blue; box-shadow: inset 0 0 10px black; }
        #status { margin: 20px; font-size: 20px; font-weight: bold; }
        button { padding: 10px 20px; cursor: pointer; background: #444; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Connect 4 🔴 vs 🔵</h1>
    <div id="status">Menghubungkan...</div>
    <div id="board"></div>
    <br>
    <button onclick="restartGame()">🔄 Reset Papan</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAL_LeOEAay6vF6Y3vAr2qaV9UiAMMDS5E",
        authDomain: "connect4-a1fc8.firebaseapp.com",
        databaseURL: "https://connect4-a1fc8-default-rtdb.firebaseio.com",
        projectId: "connect4-a1fc8",
        storageBucket: "connect4-a1fc8.firebasestorage.app",
        messagingSenderId: "205743853657",
        appId: "1:205743853657:web:46dcf941b55c6ba8192148"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, "games/room1");

    let grid = Array(6).fill().map(() => Array(7).fill(null));
    let currentPlayer = "red";

    // 1. Fungsi Klik Kolom
    window.dropPiece = function(col) {
        let rowToFill = -1;
        for (let r = 5; r >= 0; r--) {
            if (grid[r] && grid[r][col] === null) {
                rowToFill = r;
                break;
            }
        }

        if (rowToFill !== -1) {
            grid[rowToFill][col] = currentPlayer;
            const nextPlayer = (currentPlayer === "red") ? "blue" : "red";
            set(gameRef, { grid, currentPlayer: nextPlayer });
        }
    };

    // 2. Fungsi Reset
    window.restartGame = function() {
        const emptyGrid = Array(6).fill().map(() => Array(7).fill(null));
        set(gameRef, { grid: emptyGrid, currentPlayer: "red" });
    };

    // 3. Render Papan (Gambar Ulang)
    function render() {
        const board = document.getElementById("board");
        board.innerHTML = "";
        
        for (let r = 0; r < 6; r++) {
            for (let c = 0; c < 7; c++) {
                const cell = document.createElement("div");
                cell.className = "cell";
                
                // Tambahkan warna jika ada datanya
                if (grid[r] && grid[r][c]) {
                    cell.classList.add(grid[r][c]);
                }

                // Pasang fungsi klik
                cell.onclick = () => window.dropPiece(c);
                board.appendChild(cell);
            }
        }
        
        document.getElementById("status").textContent = "Giliran: " + (currentPlayer === "red" ? "🔴 Merah" : "🔵 Biru");
    }

    // 4. Sinkronisasi Realtime
    onValue(gameRef, (snapshot) => {
        const data = snapshot.val();
        if (data && data.grid) {
            grid = data.grid;
            currentPlayer = data.currentPlayer || "red";
            render();
        } else {
            // Jika database kosong, buatkan grid awal
            window.restartGame();
        }
    });
</script>
</body>
</html>
