<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Connect 4 - Realtime Firebase</title>
    <style>
        body { background: #111; display: flex; flex-direction: column; align-items: center; color: white; font-family: Arial, sans-serif; }
        h1 { margin-top: 20px; }
        #board { 
            display: grid; grid-template-columns: repeat(7, 60px); grid-template-rows: repeat(6, 60px); 
            gap: 8px; background: #0055ff; padding: 15px; border-radius: 10px; margin-top: 20px;
        }
        @media (min-width: 600px) { #board { grid-template-columns: repeat(7, 80px); grid-template-rows: repeat(6, 80px); } }
        .cell { width: 100%; height: 100%; background: #222; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .red { background: #ff4136; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .blue { background: #0074d9; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        #status { margin-top: 20px; font-size: 22px; font-weight: bold; }
        #restartBtn { margin-top: 15px; padding: 10px 20px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; background: #444; color: white; }
        #restartBtn:hover { background: #666; }
    </style>
</head>
<body>

<h1>Connect 4 🔴 vs 🔵</h1>
<div id="status">Menghubungkan ke Firebase...</div>
<div id="board"></div>
<button id="restartBtn">🔄 Restart Game</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAL_LeOEAay6vF6Y3vAr2qaV9UiAMMDS5E",
        authDomain: "connect4-a1fc8.firebaseapp.com",
        databaseURL: "https://connect4-a1fc8-default-rtdb.firebaseio.com",
        projectId: "connect4-a1fc8",
        storageBucket: "connect4-a1fc8.firebasestorage.app",
        messagingSenderId: "205743853657",
        appId: "1:205743853657:web:46dcf941b55c6ba8192148"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, "games/room1");

    const board = document.getElementById("board");
    const statusText = document.getElementById("status");
    const restartBtn = document.getElementById("restartBtn");

    let grid = Array(6).fill().map(() => Array(7).fill(null));
    let currentPlayer = "red";
    let gameOver = false;

    // --- 1. INISIALISASI PAPAN ---
    function createBoard() {
        board.innerHTML = "";
        for (let r = 0; r < 6; r++) {
            for (let c = 0; c < 7; c++) {
                const cell = document.createElement("div");
                cell.classList.add("cell");
                cell.id = `cell-${r}-${c}`;
                cell.onclick = () => dropPiece(c);
                board.appendChild(cell);
            }
        }
    }
    createBoard();

    // --- 2. LOGIKA JATUHKAN PION ---
    function dropPiece(col) {
        if (gameOver) return;

        let rowToFill = -1;
        for (let r = 5; r >= 0; r--) {
            if (grid[r] && grid[r][col] === null) {
                rowToFill = r;
                break;
            }
        }

        if (rowToFill !== -1) {
            // Update lokal sebentar untuk cek menang
            grid[rowToFill][col] = currentPlayer;
            
            let isWinner = checkWin(rowToFill, col);
            let nextPlayer = currentPlayer === "red" ? "blue" : "red";

            // KIRIM KE FIREBASE
            set(gameRef, {
                grid: grid,
                currentPlayer: nextPlayer,
                gameOver: isWinner,
                winner: isWinner ? currentPlayer : null
            });
        }
    }

    // --- 3. SINKRONISASI REALTIME ---
    onValue(gameRef, (snapshot) => {
        const data = snapshot.val();
        if (!data) {
            restartGame(); // Jika database kosong, buat baru
            return;
        }

        grid = data.grid;
        currentPlayer = data.currentPlayer;
        gameOver = data.gameOver;

        updateUI(data.winner);
    });

    function updateUI(winner) {
        for (let r = 0; r < 6; r++) {
            for (let c = 0; c < 7; c++) {
                const cell = document.getElementById(`cell-${r}-${c}`);
                cell.className = "cell"; // Reset
                if (grid[r][c]) cell.classList.add(grid[r][c]);
            }
        }

        if (gameOver && winner) {
            statusText.textContent = (winner === "red" ? "🔴 Merah" : "🔵 Biru") + " MENANG 🔥";
        } else {
            statusText.textContent = "Giliran: " + (currentPlayer === "red" ? "🔴 Merah" : "🔵 Biru");
        }
    }

    // --- 4. LOGIKA CEK MENANG ---
    function checkWin(row, col) {
        return (
            countDir(row, col, 0, 1) + countDir(row, col, 0, -1) > 2 || // Horizontal
            countDir(row, col, 1, 0) > 2 || // Vertical
            countDir(row, col, 1, 1) + countDir(row, col, -1, -1) > 2 || // Diagonal \
            countDir(row, col, 1, -1) + countDir(row, col, -1, 1) > 2    // Diagonal /
        );
    }

    function countDir(row, col, rowDir, colDir) {
        let count = 0;
        let r = row + rowDir;
        let c = col + colDir;
        while (r >= 0 && r < 6 && c >= 0 && c < 7 && grid[r][c] === currentPlayer) {
            count++;
            r += rowDir;
            c += colDir;
        }
        return count;
    }

    // --- 5. RESTART ---
    function restartGame() {
        set(gameRef, {
            grid: Array(6).fill().map(() => Array(7).fill(null)),
            currentPlayer: "red",
            gameOver: false,
            winner: null
        });
    }

    restartBtn.addEventListener("click", restartGame);
</script>
</body>
</html>
