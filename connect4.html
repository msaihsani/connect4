<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Connect 4 - Player vs Bot</title>
    <style>
        body { background: #111; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; padding: 20px; }
        #board { 
            display: grid; grid-template-columns: repeat(7, 50px); grid-template-rows: repeat(6, 50px); 
            gap: 8px; background: #0055ff; padding: 15px; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        @media (min-width: 600px) { #board { grid-template-columns: repeat(7, 80px); grid-template-rows: repeat(6, 80px); } }
        .cell { width: 100%; height: 100%; background: #222; border-radius: 50%; cursor: pointer; border: none; transition: 0.2s; }
        .cell.red { background: #ff4136; box-shadow: inset 0 0 15px rgba(0,0,0,0.6); }
        .cell.blue { background: #0074d9; box-shadow: inset 0 0 15px rgba(0,0,0,0.6); }
        #status { margin: 20px; font-size: 24px; font-weight: bold; min-height: 35px; }
        button { padding: 10px 25px; cursor: pointer; background: #444; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #666; }
    </style>
</head>
<body>

    <h1>Connect 4: Kamu vs Bot 🤖</h1>
    <div id="status">Giliranmu: 🔴</div>
    <div id="board"></div>
    <br>
    <button onclick="resetGame()">🔄 Ulang Permainan</button>

<script>
    const ROWS = 6;
    const COLS = 7;
    let grid = Array(ROWS).fill().map(() => Array(COLS).fill(null));
    let currentPlayer = "red"; // Red = Kamu, Blue = Bot
    let gameOver = false;

    const boardEl = document.getElementById("board");
    const statusText = document.getElementById("status");

    function initBoard() {
        boardEl.innerHTML = "";
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const cell = document.createElement("div");
                cell.className = "cell";
                cell.id = `cell-${r}-${c}`;
                cell.onclick = () => playerMove(c);
                boardEl.appendChild(cell);
            }
        }
    }

    function playerMove(col) {
        if (gameOver || currentPlayer !== "red") return;
        if (makeMove(col, "red")) {
            if (!gameOver) {
                currentPlayer = "blue";
                statusText.textContent = "Bot sedang berpikir... 🤖";
                setTimeout(botMove, 600); // Bot mikir 0.6 detik
            }
        }
    }

    function botMove() {
        if (gameOver) return;
        
        // Strategi Bot: 1. Cari kemenangan, 2. Blokir lawan, 3. Random
        let move = findWinningMove("blue") || findWinningMove("red") || randomMove();
        
        makeMove(move, "blue");
        if (!gameOver) {
            currentPlayer = "red";
            statusText.textContent = "Giliranmu: 🔴";
        }
    }

    function makeMove(col, color) {
        for (let r = ROWS - 1; r >= 0; r--) {
            if (grid[r][col] === null) {
                grid[r][col] = color;
                updateUI();
                if (checkWin(r, col, color)) {
                    statusText.textContent = color === "red" ? "Kamu Menang! 🎉" : "Bot Menang! 🤖";
                    gameOver = true;
                }
                return true;
            }
        }
        return false;
    }

    function findWinningMove(color) {
        for (let c = 0; c < COLS; c++) {
            for (let r = ROWS - 1; r >= 0; r--) {
                if (grid[r][c] === null) {
                    grid[r][c] = color;
                    let win = checkWin(r, c, color);
                    grid[r][c] = null; // Reset lagi
                    if (win) return c;
                    break;
                }
            }
        }
        return null;
    }

    function randomMove() {
        let validCols = [];
        for (let c = 0; c < COLS; c++) if (grid[0][c] === null) validCols.push(c);
        return validCols[Math.floor(Math.random() * validCols.length)];
    }

    function updateUI() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const cell = document.getElementById(`cell-${r}-${c}`);
                cell.className = "cell";
                if (grid[r][c]) cell.classList.add(grid[r][c]);
            }
        }
    }

    function checkWin(r, c, color) {
        return (
            checkDir(r, c, 0, 1, color) + checkDir(r, c, 0, -1, color) >= 3 || // Horiz
            checkDir(r, c, 1, 0, color) + checkDir(r, c, -1, 0, color) >= 3 || // Vert
            checkDir(r, c, 1, 1, color) + checkDir(r, c, -1, -1, color) >= 3 || // Diag \
            checkDir(r, c, 1, -1, color) + checkDir(r, c, -1, 1, color) >= 3    // Diag /
        );
    }

    function checkDir(row, col, rDir, cDir, color) {
        let count = 0;
        let r = row + rDir;
        let c = col + cDir;
        while (r >= 0 && r < ROWS && c >= 0 && c < COLS && grid[r][c] === color) {
            count++;
            r += rDir;
            c += cDir;
        }
        return count;
    }

    window.resetGame = function() {
        grid = Array(ROWS).fill().map(() => Array(COLS).fill(null));
        currentPlayer = "red";
        gameOver = false;
        statusText.textContent = "Giliranmu: 🔴";
        updateUI();
    };

    initBoard();
</script>
</body>
</html>
