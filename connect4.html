<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Connect 4 - Red vs Blue</title>
<style>
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: white;
    font-family: Arial, sans-serif;
  }

  h1 {
    margin-top: 20px;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(7, 80px);
    grid-template-rows: repeat(6, 80px);
    gap: 8px;
    background: #222;
    padding: 10px;
    border-radius: 10px;
    margin-top: 20px;
  }

  .cell {
    width: 80px;
    height: 80px;
    background: #333;
    border-radius: 50%;
    cursor: pointer;
    transition: 0.2s;
  }

  .red {
    background: red;
  }

  .blue {
    background: blue;
  }

  #status {
    margin-top: 20px;
    font-size: 18px;
  }
#restartBtn {
  margin-top: 15px;
  padding: 10px 20px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #444;
  color: white;
  transition: 0.2s;
}

#restartBtn:hover {
  background: #666;
}
</style>
</head>
<body>

<h1>Connect 4 🔴 vs 🔵</h1>
<div id="board"></div>
<div id="status">Giliran: 🔴 Merah</div>
<button onclick="restartGame()" id="restartBtn">
  🔄 Restart Game
</button>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAL_LeOEAay6vF6Y3vAr2qaV9UiAMMDS5E",
  authDomain: "connect4-a1fc8.firebaseapp.com",
  databaseURL: "https://connect4-a1fc8-default-rtdb.firebaseio.com",
  projectId: "connect4-a1fc8",
  storageBucket: "connect4-a1fc8.firebasestorage.app",
  messagingSenderId: "205743853657",
  appId: "1:205743853657:web:46dcf941b55c6ba8192148",
  measurementId: "G-JFPMTX9E93"
};

// ... (Firebase config tetap sama)

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const gameRef = ref(db, "games/room1");

const board = document.getElementById("board");
const statusText = document.getElementById("status");

let currentPlayer = "red";
let gameOver = false;
let grid = Array(6).fill().map(() => Array(7).fill(null));

// Buat grid secara visual
function createBoard() {
  board.innerHTML = ""; // Bersihkan board dulu
  for (let row = 0; row < 6; row++) {
    for (let col = 0; col < 7; col++) {
      const cell = document.createElement("div");
      cell.classList.add("cell");
      cell.dataset.row = row;
      cell.dataset.col = col;
      // Gunakan event listener di sini
      cell.addEventListener("click", () => dropPiece(col));
      board.appendChild(cell);
    }
  }
}

createBoard();

function dropPiece(col) {
  if (gameOver) return;

  // Cari baris kosong dari bawah
  let placed = false;
  for (let row = 5; row >= 0; row--) {
    if (!grid[row][col]) {
      grid[row][col] = currentPlayer;
      placed = true;
      break;
    }
  }

  if (placed) {
    // Ganti giliran
    const nextPlayer = currentPlayer === "red" ? "blue" : "red";
    
    // Kirim ke Firebase
    set(gameRef, {
      grid: grid,
      currentPlayer: nextPlayer,
      gameOver: gameOver
    });
  }
}

onValue(gameRef, (snapshot) => {
  const data = snapshot.val();
  
  // Jika data belum ada di Firebase (game baru), inisialisasi
  if (!data) {
    restartGame(); 
    return;
  }

  grid = data.grid;
  currentPlayer = data.currentPlayer;
  gameOver = data.gameOver;

  updateUI();
});

function updateUI() {
  const cells = document.querySelectorAll(".cell");
  cells.forEach(cell => {
    const row = cell.dataset.row;
    const col = cell.dataset.col;
    const color = grid[row][col];

    cell.classList.remove("red", "blue");
    if (color) {
      cell.classList.add(color);
    }
  });

  statusText.textContent = "Giliran: " + (currentPlayer === "red" ? "🔴 Merah" : "🔵 Biru");
}

// Ekspos fungsi restart ke global window agar onclick di HTML bisa jalan
window.restartGame = function() {
  const emptyGrid = Array(6).fill().map(() => Array(7).fill(null));
  set(gameRef, {
    grid: emptyGrid,
    currentPlayer: "red",
    gameOver: false
  });
};
</script>
</body>

</html>
